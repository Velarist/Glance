name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Rust daemon ────────────────────────────────────────────────────────────
  daemon:
    name: Daemon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (debug)
        run: cargo build

      - name: Build (release)
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Upload binary (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: glance-macos
          path: target/release/glance

      - name: Upload binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: glance-linux
          path: target/release/glance

      - name: Upload binary (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: glance-windows
          path: target/release/glance.exe

  # ── VS Code extension ──────────────────────────────────────────────────────
  vscode:
    name: VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Build TypeScript
        working-directory: extensions/vscode
        run: npm run build

  # ── Zed extension ──────────────────────────────────────────────────────────
  zed:
    name: Zed Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            extensions/zed/target/
          key: zed-cargo-${{ hashFiles('extensions/zed/Cargo.lock') }}
          restore-keys: zed-cargo-

      - name: Check (native, warnings as errors)
        working-directory: extensions/zed
        run: cargo clippy -- -D warnings

      - name: Build (WASM)
        working-directory: extensions/zed
        run: cargo build --target wasm32-wasip1 --release

  # ── Package VSIX (on push to main only) ───────────────────────────────────
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: [daemon, vscode]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Download Linux binary
        uses: actions/download-artifact@v5
        with:
          name: glance-linux
          path: extensions/vscode/bin/

      - name: Make binary executable
        run: chmod +x extensions/vscode/bin/glance

      - name: Install dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Build TypeScript
        working-directory: extensions/vscode
        run: npm run build

      - name: Package VSIX
        working-directory: extensions/vscode
        run: npx vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v5
        with:
          name: glance-vscode
          path: extensions/vscode/*.vsix
