name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build daemon binaries ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: glance
            artifact: glance-linux-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: glance
            artifact: glance-macos-arm64

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: glance
            artifact: glance-macos-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: glance.exe
            artifact: glance-windows-x86_64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # ── Package platform-specific VSIX ────────────────────────────────────────
  # Each VSIX bundles the daemon binary for that specific OS.
  vsix:
    name: Package VSIX (${{ matrix.vsce_target }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - vsce_target: linux-x64
            artifact: glance-linux-x86_64
            binary_src: glance
            binary_dst: glance

          - vsce_target: darwin-arm64
            artifact: glance-macos-arm64
            binary_src: glance
            binary_dst: glance

          - vsce_target: darwin-x64
            artifact: glance-macos-x86_64
            binary_src: glance
            binary_dst: glance

          - vsce_target: win32-x64
            artifact: glance-windows-x86_64
            binary_src: glance.exe
            binary_dst: glance.exe

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Download platform binary
        uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: extensions/vscode/bin/

      - name: Rename binary to expected name
        run: |
          mv extensions/vscode/bin/${{ matrix.binary_src }} extensions/vscode/bin/${{ matrix.binary_dst }} 2>/dev/null || true
          chmod +x extensions/vscode/bin/${{ matrix.binary_dst }} 2>/dev/null || true

      - name: Install dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Build TypeScript
        working-directory: extensions/vscode
        run: npm run build

      - name: Package VSIX
        working-directory: extensions/vscode
        run: npx vsce package --target ${{ matrix.vsce_target }} --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: glance-vscode-${{ matrix.vsce_target }}
          path: extensions/vscode/*.vsix

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, vsix]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/glance-linux-x86_64/glance
            artifacts/glance-macos-arm64/glance
            artifacts/glance-macos-x86_64/glance
            artifacts/glance-windows-x86_64/glance.exe
            artifacts/glance-vscode-linux-x64/*.vsix
            artifacts/glance-vscode-darwin-arm64/*.vsix
            artifacts/glance-vscode-darwin-x64/*.vsix
            artifacts/glance-vscode-win32-x64/*.vsix
